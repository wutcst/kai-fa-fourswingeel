<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>宝箱</title>
  <script src="card_ui.js"></script>
  <style>
    body {
      background: #1a1a2e; display: flex; flex-direction: column;
      align-items: center; justify-content: center; height: 100vh; margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: #e0e0e0;
    }
    .chest-icon {
      font-size: 100px; cursor: pointer; transition: transform 0.3s;
      user-select: none;
    }
    .chest-icon:hover { transform: scale(1.2); }
    .hint { margin-top: 20px; color: #f1c40f; }
  </style>
</head>
<body>
  <script src="status_bar.js"></script>
  <div class="chest-icon" id="chest">📦</div>
  <div class="hint">点击宝箱打开！</div>
  <!-- chest.html 中 script 部分 -->
<script>
  const params = new URLSearchParams(window.location.search);
  const char = params.get('char') || '1';
  const currentNode = params.get('currentNode') || '';
  const nextNode = params.get('nextNode') || currentNode;
  const act = params.get('act') || '1';

  document.getElementById('chest').addEventListener('click', () => {
    window.location.href = `reward.html?source=chest&char=${char}&prevNode=${encodeURIComponent(currentNode)}&nextNode=${encodeURIComponent(nextNode)}&nodeType=chest&act=${act}`;
  });
</script>
</body>
</html>
