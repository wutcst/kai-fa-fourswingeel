<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>选择卡牌</title>
  <script src="save_helper.js"></script>
  <script src="card_ui.js"></script>
  <style>
    body { background: #1a1a2e; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; padding-top: 50px; }
    h2 { color: #f1c40f; }
    .card-list { display: flex; gap: 20px; margin-top: 30px; flex-wrap: wrap; justify-content: center; }
    .card { width: 150px; padding: 20px; border: 2px solid #34495e; border-radius: 8px; background: linear-gradient(135deg, #667eea, #764ba2); text-align: center; cursor: pointer; color: white; transition: all 0.3s; }
    .card:hover { transform: scale(1.05); border-color: #f1c40f; }
    .skip { margin-top: 40px; background: #e74c3c; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; }
  </style>
</head>
<body>
  <h2>选择一张卡牌加入卡组</h2>
  <div class="card-list" id="card-list"></div>
  <button class="skip" id="skip-btn">跳过</button>

  <script>
    (async function() {
      const params = new URLSearchParams(window.location.search);
      const char = params.get('char') || '1';
      const query = new URLSearchParams(params).toString();

      const cards = JSON.parse(sessionStorage.getItem('rewardCards') || '[]');
      const listDiv = document.getElementById('card-list');

      cards.forEach(card => {
        const div = document.createElement('div');
        div.className = 'card';
        div.innerHTML = `<h3>${card.name}</h3><p>⚡${card.cost}</p><p style="font-size:12px;color:#ecf0f1;">${CARD_UI.getCardEffectText(card)}</p>`;
        CARD_UI.bindTooltip(div, card.applyStatusType);

        div.addEventListener('click', async () => {
          const saveData = await loadSaveData(char);
          saveData.deck.push({
            name: card.name, cost: card.cost, damage: card.damage, block: card.block, type: card.type,
            applyStatusType: card.applyStatusType, applyStatusCount: card.applyStatusCount, applyStatusTarget: card.applyStatusTarget
          });
          await saveSaveData(saveData);
          alert(`获得卡牌：${card.name}`);
          window.location.href = `reward.html?${query}&gotCard=1`;
        });
        listDiv.appendChild(div);
      });

      document.getElementById('skip-btn').addEventListener('click', () => {
        window.location.href = `reward.html?${query}&gotCard=1`;
      });
    })();
  </script>
</body>
</html>
