<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>选择卡牌</title>
  <script src="save_helper.js"></script>
  <script src="card_ui.js"></script>
  <style>
    body { background: #1a1a2e; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; padding-top: 50px; }
    h2 { color: #f1c40f; }
    .card-list { display: flex; gap: 20px; margin-top: 30px; flex-wrap: wrap; justify-content: center; }
    .card { width: 150px; padding: 20px; border: 3px solid #34495e; border-radius: 8px; text-align: center; cursor: pointer; color: white; transition: all 0.3s; }
    .card:hover { transform: scale(1.05); border-color: #f1c40f; }
    .card.attack { border-left: 5px solid #e74c3c; }
    .card.skill  { border-left: 5px solid #3498db; }
    .card.power  { border-left: 5px solid #2ecc71; }
    .card .card-type-label { font-size: 10px; color: #ccc; margin-top: 2px; }
    .skip { margin-top: 40px; background: #e74c3c; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; }
  </style>
</head>
<body>
  <h2>选择一张卡牌加入卡组</h2>
  <div class="card-list" id="card-list"></div>
  <button class="skip" id="skip-btn">跳过</button>

  <script>
    (async function() {
      const params = new URLSearchParams(window.location.search);
      const char = params.get('char') || '1';
      const query = new URLSearchParams(params).toString();

      const cards = JSON.parse(sessionStorage.getItem('rewardCards') || '[]');
      const listDiv = document.getElementById('card-list');

      cards.forEach(card => {
        const div = document.createElement('div');
        div.className = `card ${CARD_UI.getCardTypeClass(card)}`;
        div.style.background = CARD_UI.getCardCharStyle(card);
        
        // 稀有度边框颜色（覆盖class的左边框）
        const borderColor = CARD_UI.getRarityBorderColor(card);
        div.style.borderColor = borderColor;
        div.style.borderWidth = '3px';
        
        const typeLabel = CARD_UI.getCardTypeLabel(card);
        div.innerHTML = `<h3>${card.name}</h3><p>⚡${card.cost}</p><div class="card-type-label">${typeLabel}</div><p style="font-size:12px;color:#ecf0f1;">${CARD_UI.getCardEffectText(card)}</p>`;
        var firstEffect = CARD_UI.getCardEffects(card); CARD_UI.bindTooltip(div, firstEffect.length > 0 ? firstEffect[0].type : null);

        div.addEventListener('click', async () => {
          const saveData = await loadSaveData(char);
          
          // ✅ 核心修复：补全所有卡牌属性，确保加入卡组后效果不丢失
          saveData.deck.push({
            id: card.id, name: card.name, cost: card.cost,
            damage: card.damage || 0, block: card.block || 0, type: card.type,
            effects: card.effects || [],
            drawCount: card.drawCount || 0, selfDamage: card.selfDamage || 0,
            energyGain: card.energyGain || 0, multiHitCount: card.multiHitCount || 1,
            exhaust: card.exhaust || false, retain: card.retain || false,
            ethereal: card.ethereal || false, innate: card.innate || false,
            unplayable: card.unplayable || false, xCost: card.xCost || false,
            aoe: card.aoe || false, drawFirst: card.drawFirst || false,
            exhaustHandCount: card.exhaustHandCount || 0,
            exhaustHandMode: card.exhaustHandMode || 'RANDOM',
            discardCount: card.discardCount || 0,
            charId: card.charId || '1', rarity: card.rarity || 'COMMON',
            upgraded: card.upgraded || false
          });
          
          await saveSaveData(saveData);
          alert(`获得卡牌：${card.name}`);
          window.location.href = `reward.html?${query}&gotCard=1`;
        });
        listDiv.appendChild(div);
      });

      document.getElementById('skip-btn').addEventListener('click', () => {
        window.location.href = `reward.html?${query}&gotCard=1`;
      });
    })();
  </script>
  <!-- 加入背景音乐支持 -->
  <script src="status_bar.js"></script>
</body>
</html>
