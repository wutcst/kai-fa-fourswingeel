<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>胜利 - 杀戮尖塔</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #0a0a1a; color: #e0e0e0;
      display: flex; justify-content: center; align-items: center;
      min-height: 100vh; margin: 0;
    }
    .container {
      background: #16213e; border-radius: 16px;
      padding: 40px 50px; max-width: 500px; width: 90%;
      text-align: center; box-shadow: 0 0 60px rgba(46, 204, 113, 0.3);
    }
    h1 {
      font-size: 64px; margin-bottom: 10px;
      text-shadow: 0 0 30px #2ecc71;
    }
    .subtitle {
      font-size: 28px; color: #2ecc71; font-weight: bold;
      margin-bottom: 30px; letter-spacing: 2px;
    }
    .stats {
      font-size: 16px; color: #bdc3c7; margin-bottom: 30px;
    }
    .btn {
      padding: 14px 40px; font-size: 18px; font-weight: bold;
      border: 2px solid #2ecc71; background: transparent;
      color: #2ecc71; border-radius: 8px; cursor: pointer;
      transition: all 0.3s ease; letter-spacing: 2px;
    }
    .btn:hover {
      background: #2ecc71; color: white;
      box-shadow: 0 0 25px #2ecc71; transform: scale(1.05);
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🏆</h1>
    <div class="subtitle">恭喜通关！</div>
    <div class="stats" id="stats"></div>
    <button class="btn" id="return-btn">返回主菜单</button>
  </div>

  <script>
    (function() {
      // 显示一些基础统计（可以从 localStorage 获取）
      const deck = JSON.parse(localStorage.getItem('deck') || '[]');
      const relics = JSON.parse(localStorage.getItem('relics') || '[]');
      const gold = localStorage.getItem('gold') || '0';
      document.getElementById('stats').innerHTML = `
        <p>卡组数量: ${deck.length}</p>
        <p>遗物数量: ${relics.length}</p>
        <p>金币: ${gold}</p>
      `;

      // 清除游戏数据并返回封面
      document.getElementById('return-btn').addEventListener('click', function() {
        localStorage.removeItem('playerHP');
        localStorage.removeItem('maxHP');
        localStorage.removeItem('gold');
        localStorage.removeItem('deck');
        localStorage.removeItem('relics');
        localStorage.removeItem('visitedNodes');
        localStorage.removeItem('startRelicDone');
        sessionStorage.clear();
        window.location.href = 'cover.html';
      });
    })();
  </script>
  <script src="status_bar.js"></script>
</body>
</html>
