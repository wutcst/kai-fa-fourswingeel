<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>奖励</title>
  <style>
    body {
      background: #1a1a2e; display: flex; align-items: center;
      justify-content: center; height: 100vh; margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: #e0e0e0;
    }
    .panel {
      background: #16213e; border-radius: 12px; padding: 30px 40px;
      display: flex; flex-direction: column; gap: 20px;
      box-shadow: 0 0 30px rgba(0,0,0,0.5);
      position: relative; min-width: 280px;
    }
    .reward-btn {
      background: #e67e22; color: white; border: none;
      padding: 15px 30px; font-size: 18px; border-radius: 8px;
      cursor: pointer; transition: all 0.3s;
    }
    .reward-btn:hover:not(:disabled) { background: #d35400; transform: translateY(-2px); }
    .reward-btn:disabled {
      background: #555; color: #aaa; cursor: not-allowed; transform: none;
    }
    .skip-btn {
      position: absolute; bottom: -60px; right: 0;
      background: #e74c3c; color: white; border: none;
      padding: 12px 24px; font-size: 16px; border-radius: 8px;
      cursor: pointer; transition: all 0.3s;
    }
    .skip-btn:hover { background: #c0392b; transform: translateY(-2px); }
    .loading { text-align: center; color: #f1c40f; font-size: 18px; }
  </style>
</head>
<body>
  <script src="status_bar.js"></script>
  <div class="panel" id="reward-panel">
    <div class="loading">正在获取奖励...</div>
  </div>
  <script>
    (async function() {
      const params = new URLSearchParams(window.location.search);
      const char = params.get('char') || '1';
      const prevNode = params.get('prevNode') || 'start';
      const nextNode = params.get('nextNode') || 'start';
      const nodeType = params.get('nodeType') || 'monster';
      // 从 URL 读取已领取状态（选牌页返回时携带）
      const gotGold = params.get('gotGold') === '1';
      const gotRelic = params.get('gotRelic') === '1';

      // 默认奖励数据
      const defaultReward = {
        gold: 50,
        relic: '神秘遗物',
        cardPool: [
          { name: '打击', cost: 1, damage: 6, block: 0, type: 'ATTACK' },
          { name: '防御', cost: 1, damage: 0, block: 5, type: 'SKILL' },
          { name: '重击', cost: 2, damage: 12, block: 0, type: 'ATTACK' }
        ]
      };

      // 尝试从后端获取奖励
      let reward = defaultReward;
      try {
        const resp = await fetch(`/api/reward?nodeType=${encodeURIComponent(nodeType)}`);
        if (resp.ok) {
          const data = await resp.json();
          reward = {
            gold: data.gold || defaultReward.gold,
            relic: data.relic || defaultReward.relic,
            cardPool: data.cards || defaultReward.cardPool
          };
        }
      } catch (e) {
        console.warn('后端奖励接口不可用，使用默认奖励', e);
      }

      // 本地状态（用于按钮禁用）
      let localGotGold = gotGold;
      let localGotRelic = gotRelic;

      function goBackToMap() {
        window.location.href = `map.html?char=${char}&currentNode=${encodeURIComponent(nextNode)}`;
      }

      function giveGold(amount) {
        if (localGotGold) return; // 防止重复
        let gold = parseInt(localStorage.getItem('gold') || '0');
        gold += amount;
        localStorage.setItem('gold', gold);
        localGotGold = true;
        alert(`获得 ${amount} 金币！`);
        if (window.updateStatusBar) window.updateStatusBar();
      }

      function giveRelic(relicName) {
        if (localGotRelic) return;
        const relics = JSON.parse(localStorage.getItem('relics') || '[]');
        relics.push(relicName);
        localStorage.setItem('relics', JSON.stringify(relics));
        localGotRelic = true;
        alert(`获得 ${relicName}！`);
        if (window.updateStatusBar) window.updateStatusBar();
      }

      function goToCardSelect() {
        // 将卡牌池存入 sessionStorage，并传递当前领取状态
        sessionStorage.setItem('rewardCards', JSON.stringify(reward.cardPool));
        const query = `char=${encodeURIComponent(char)}&prevNode=${encodeURIComponent(prevNode)}&nextNode=${encodeURIComponent(nextNode)}&nodeType=${encodeURIComponent(nodeType)}&gotGold=${localGotGold ? '1' : '0'}&gotRelic=${localGotRelic ? '1' : '0'}`;
        window.location.href = `card_select.html?${query}`;
      }

      // 渲染按钮
      const panel = document.getElementById('reward-panel');
      panel.innerHTML = '';

      // 金币按钮
      const goldBtn = document.createElement('button');
      goldBtn.className = 'reward-btn';
      goldBtn.textContent = `💰 获得金币 +${reward.gold}`;
      if (gotGold) goldBtn.disabled = true;
      goldBtn.addEventListener('click', () => {
        giveGold(reward.gold);
        goldBtn.disabled = true;
      });
      panel.appendChild(goldBtn);

      // 卡牌按钮
      const cardBtn = document.createElement('button');
      cardBtn.className = 'reward-btn';
      cardBtn.textContent = '🃏 选择一张卡牌';
      cardBtn.addEventListener('click', goToCardSelect);
      panel.appendChild(cardBtn);

      // 遗物按钮（精英/宝箱/boss）
      if (nodeType === 'elite' || nodeType === 'chest' || nodeType === 'boss') {
        const relicBtn = document.createElement('button');
        relicBtn.className = 'reward-btn';
        relicBtn.textContent = `📿 获得 ${reward.relic}`;
        if (gotRelic) relicBtn.disabled = true;
        relicBtn.addEventListener('click', () => {
          giveRelic(reward.relic);
          relicBtn.disabled = true;
        });
        panel.appendChild(relicBtn);
      }

      // 跳过按钮
      const skipBtn = document.createElement('button');
      skipBtn.className = 'skip-btn';
      skipBtn.textContent = '跳过 →';
      skipBtn.addEventListener('click', goBackToMap);
      panel.appendChild(skipBtn);
    })();
  </script>
</body>
</html>
