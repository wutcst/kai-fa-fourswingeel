<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>奖励</title>
  <script src="save_helper.js"></script>
  <style>
    body {
      background: #1a1a2e;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: #e0e0e0;
    }
    .panel {
      background: #16213e;
      border-radius: 12px;
      padding: 30px 40px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      box-shadow: 0 0 30px rgba(0,0,0,0.5);
      position: relative;
      min-width: 280px;
    }
    .reward-btn {
      background: #e67e22;
      color: white;
      border: none;
      padding: 15px 30px;
      font-size: 18px;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s;
    }
    .reward-btn:hover:not(:disabled) {
      background: #d35400;
      transform: translateY(-2px);
    }
    .reward-btn:disabled {
      background: #555;
      color: #aaa;
      cursor: not-allowed;
      transform: none;
    }
    .skip-btn {
      position: absolute;
      bottom: -60px;
      right: 0;
      background: #e74c3c;
      color: white;
      border: none;
      padding: 12px 24px;
      font-size: 16px;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s;
    }
    .skip-btn:hover {
      background: #c0392b;
      transform: translateY(-2px);
    }
    .loading {
      text-align: center;
      color: #f1c40f;
      font-size: 18px;
    }
  </style>
</head>
<body>
  <div class="panel" id="reward-panel">
    <div class="loading">正在获取奖励...</div>
  </div>

  <script>
    (async function() {
      const params = new URLSearchParams(window.location.search);
      const char = params.get('char') || '1';
      const prevNode = params.get('prevNode') || 'start';
      const nextNode = params.get('nextNode') || 'start';
      const nodeType = params.get('nodeType') || 'monster';
      const gotGold = params.get('gotGold') === '1';
      const gotRelic = params.get('gotRelic') === '1';
      const gotCard = params.get('gotCard') === '1';

      const isReturnVisit = params.has('gotGold') || params.has('gotRelic') || params.has('gotCard');

      const defaultReward = {
        gold: 50,
        relic: '神秘遗物',
        cardPool: [
          { name: '打击', cost: 1, damage: 6, block: 0, type: 'ATTACK' },
          { name: '防御', cost: 1, damage: 0, block: 5, type: 'SKILL' },
          { name: '重击', cost: 2, damage: 12, block: 0, type: 'ATTACK' }
        ]
      };

      let reward = null;

      if (isReturnVisit) {
        const saved = sessionStorage.getItem('rewardData');
        if (saved) {
          try { reward = JSON.parse(saved); } catch (e) {}
        }
      }

      if (!reward) {
        try {
          const resp = await fetch(`/api/reward?nodeType=${encodeURIComponent(nodeType)}`);
          if (resp.ok) {
            const data = await resp.json();
            reward = {
              gold: data.gold || defaultReward.gold,
              relic: data.relic || defaultReward.relic,
              cardPool: data.cards || defaultReward.cardPool
            };
          }
        } catch (e) {
          console.warn('后端奖励接口不可用，使用默认奖励', e);
        }
        if (!reward) reward = defaultReward;
        sessionStorage.setItem('rewardData', JSON.stringify(reward));
      }

      let localGotGold = gotGold;
      let localGotRelic = gotRelic;

      function updateUrlParam(key, value) {
        const url = new URL(window.location.href);
        url.searchParams.set(key, value);
        window.history.replaceState(null, '', url.toString());
      }

      // ✅ 核心修复：跳转回地图前，必须更新后端存档的 currentNode 和 visitedNodes
      async function goBackToMap() {
        const saveData = await loadSaveData(char);
        saveData.currentNode = nextNode;
        if (!saveData.visitedNodes.includes(nextNode)) {
          saveData.visitedNodes.push(nextNode);
        }
        await saveSaveData(saveData);
        
        window.location.href = `map.html?char=${char}&currentNode=${encodeURIComponent(nextNode)}`;
      }

      async function giveGold(amount) {
        if (localGotGold) return;
        const saveData = await loadSaveData(char);
        saveData.gold += amount;
        await saveSaveData(saveData);
        localGotGold = true;
        alert(`获得 ${amount} 金币！`);
        updateUrlParam('gotGold', '1');
      }

      async function giveRelic(relicName) {
        if (localGotRelic) return;
        const saveData = await loadSaveData(char);
        saveData.relics.push(relicName);
        await saveSaveData(saveData);
        localGotRelic = true;
        alert(`获得 ${relicName}！`);
        updateUrlParam('gotRelic', '1');
      }

      function goToCardSelect() {
        sessionStorage.setItem('rewardCards', JSON.stringify(reward.cardPool));
        const query = `char=${encodeURIComponent(char)}&prevNode=${encodeURIComponent(prevNode)}&nextNode=${encodeURIComponent(nextNode)}&nodeType=${encodeURIComponent(nodeType)}&gotGold=${localGotGold ? '1' : '0'}&gotRelic=${localGotRelic ? '1' : '0'}`;
        window.location.href = `card_select.html?${query}`;
      }

      const panel = document.getElementById('reward-panel');
      panel.innerHTML = '';

      const goldBtn = document.createElement('button');
      goldBtn.className = 'reward-btn';
      goldBtn.textContent = `💰 获得金币 +${reward.gold}`;
      if (gotGold) goldBtn.disabled = true;
      goldBtn.addEventListener('click', async () => {
        await giveGold(reward.gold);
        goldBtn.disabled = true;
      });
      panel.appendChild(goldBtn);

      const cardBtn = document.createElement('button');
      cardBtn.className = 'reward-btn';
      cardBtn.textContent = '🃏 选择一张卡牌';
      if (gotCard) cardBtn.disabled = true;
      cardBtn.addEventListener('click', goToCardSelect);
      panel.appendChild(cardBtn);

      if (nodeType === 'elite' || nodeType === 'chest' || nodeType === 'boss') {
        const relicBtn = document.createElement('button');
        relicBtn.className = 'reward-btn';
        relicBtn.textContent = `📿 获得 ${reward.relic}`;
        if (gotRelic) relicBtn.disabled = true;
        relicBtn.addEventListener('click', async () => {
          await giveRelic(reward.relic);
          relicBtn.disabled = true;
        });
        panel.appendChild(relicBtn);
      }

      const skipBtn = document.createElement('button');
      skipBtn.className = 'skip-btn';
      skipBtn.textContent = '跳过 →';
      skipBtn.addEventListener('click', goBackToMap);
      panel.appendChild(skipBtn);
    })();
  </script>
  
  <script src="status_bar.js"></script>
</body>
</html>
