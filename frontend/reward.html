<!DOCTYPE html>

<html lang="zh-CN">

<head>

  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>奖励</title>

  <script src="card_ui.js"></script>
  <script src="save_helper.js"></script>

  <style>

    body {

      background: #1a1a2e;

      display: flex;

      align-items: center;

      justify-content: center;

      height: 100vh;

      margin: 0;

      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;

      color: #e0e0e0;

    }

    .panel {

      background: #16213e;

      border-radius: 12px;

      padding: 30px 40px;

      display: flex;

      flex-direction: column;

      gap: 20px;

      box-shadow: 0 0 30px rgba(0,0,0,0.5);

      position: relative;

      min-width: 280px;

    }

    .reward-btn {

      background: #e67e22;

      color: white;

      border: none;

      padding: 15px 30px;

      font-size: 18px;

      border-radius: 8px;

      cursor: pointer;

      transition: all 0.3s;

    }

    .reward-btn:hover:not(:disabled) {

      background: #d35400;

      transform: translateY(-2px);

    }

    .reward-btn:disabled {

      background: #555;

      color: #aaa;

      cursor: not-allowed;

      transform: none;

    }

    .skip-btn {

      position: absolute;

      bottom: -60px;

      right: 0;

      background: #e74c3c;

      color: white;

      border: none;

      padding: 12px 24px;

      font-size: 16px;

      border-radius: 8px;

      cursor: pointer;

      transition: all 0.3s;

    }

    .skip-btn:hover {

      background: #c0392b;

      transform: translateY(-2px);

    }

    .loading {

      text-align: center;

      color: #f1c40f;

      font-size: 18px;

    }

  </style>

</head>

<body>

  <div class="panel" id="reward-panel">

    <div class="loading">正在获取奖励...</div>

  </div>



  <script>

    (async function() {

      const params = new URLSearchParams(window.location.search);

      const char = params.get('char') || '1';

      const prevNode = params.get('prevNode') || 'start';

      const nextNode = params.get('nextNode') || 'start';

      const nodeType = params.get('nodeType') || 'monster';
      const act = params.get('act') || '1';

      const gotGold = params.get('gotGold') === '1';

      const gotRelic = params.get('gotRelic') === '1';

      const gotCard = params.get('gotCard') === '1';



      const isReturnVisit = params.get('gotGold') === '1' || params.get('gotRelic') === '1' || params.get('gotCard') ===
'1';



      // 后端不可用时的降级奖励

      const defaultReward = {

        gold: 50,

        relics: [],

        cardPool: [

          { name: '打击', cost: 1, damage: 6, block: 0, type: 'ATTACK' },

          { name: '防御', cost: 1, damage: 0, block: 5, type: 'SKILL' },

          { name: '重击', cost: 2, damage: 12, block: 0, type: 'ATTACK' }

        ]

      };



      let reward = null;



      if (isReturnVisit) {

        const saved = sessionStorage.getItem('rewardData');

        if (saved) {

          try { reward = JSON.parse(saved); } catch (e) {}

        }

      }



      if (!reward) {

        try {

          const saveDataForReward = await loadSaveData(char);

          const owned = (saveDataForReward.relics || []).join(',');

          const resp = await
fetch(`/api/reward?nodeType=${encodeURIComponent(nodeType)}&ownedRelics=${owned}&charId=${char}`);

          if (resp.ok) {

            const data = await resp.json();

            reward = {

              gold: data.gold || defaultReward.gold,

              relics: data.relics || defaultReward.relics,

              cardPool: data.cards || defaultReward.cardPool

            };

          }

        } catch (e) {

          console.warn('后端奖励接口不可用，使用默认奖励', e);

        }

        if (!reward) reward = defaultReward;

        sessionStorage.setItem('rewardData', JSON.stringify(reward));

      }



      let localGotGold = gotGold;

      let localGotRelic = gotRelic;

      let collectedRelicCount = 0; // 已领取遗物数量



      function updateUrlParam(key, value) {

        const url = new URL(window.location.href);

        url.searchParams.set(key, value);

        window.history.replaceState(null, '', url.toString());

      }



      async function goToNextStageOrVictory() {

        const saveData = await loadSaveData(char);

        const currentAct = saveData.act || 1;



        if (nodeType === 'boss') {

          if (currentAct < 3) {

            const nextAct = currentAct + 1;

            saveData.act = nextAct;

            await saveSaveData(saveData);

            window.location.href = `act_start.html?char=${char}&nextAct=${nextAct}`;

            return;

          } else {

            window.location.href = `victory.html?char=${char}`;

            return;

          }

        }



        // 🆕 非 boss 胜利：保存当前 act（确保不为 undefined）

        saveData.act = currentAct;

        saveData.currentNode = nextNode;

        if (!saveData.visitedNodes.includes(nextNode)) {

          saveData.visitedNodes.push(nextNode);

        }

        await saveSaveData(saveData);

        // 🆕 跳转到地图时传递 act 参数

        window.location.href = `map.html?char=${char}&currentNode=${encodeURIComponent(nextNode)}&act=${act}`;

      }



      async function giveGold(amount) {

        if (localGotGold) return;

        const saveData = await loadSaveData(char);

        saveData.gold += amount;
        // gxyy：累计金币回血（每100金回10血）
        if ((saveData.relics || []).includes('gxyy')) {
          const before = saveData.goldTotalEarned || 0;
          const after = before + amount;
          const healTimes = Math.floor(after / 100) - Math.floor(before / 100);
          if (healTimes > 0) {
            const healAmt = healTimes * 10;
            saveData.playerHp = Math.min((saveData.playerHp || 0) + healAmt, saveData.maxHp || 70);
            window.showModal(`累计金币突破 ${Math.floor(after / 100) * 100}，恢复 ${healAmt} 点生命！`, { title: '💰 金币回血', icon: '💊', borderColor: '#2ecc71' });
          }
          saveData.goldTotalEarned = after;
        }

        // 🆕 保留 act

        if (saveData.act === undefined) saveData.act = 1;

        await saveSaveData(saveData);

        localGotGold = true;

        window.showModal(`获得 ${amount} 金币！`, { title: '💰 获取金币', icon: '💰', borderColor: '#f1c40f' });

        updateUrlParam('gotGold', '1');

      }



      async function giveRelic(relicId, effectType, value, btn) {

        const saveData = await loadSaveData(char);

        saveData.relics.push(relicId);

        if (effectType === 'MAX_HP' && value > 0) {

          saveData.maxHp = (saveData.maxHp || 70) + value;

          saveData.playerHp = Math.min((saveData.playerHp || saveData.maxHp) + value, saveData.maxHp);

        }
        // 拾起回血遗物
        // 拾起金币遗物
        if (relicId === 'small_gold_bag') saveData.gold = (saveData.gold || 0) + 50;
        if (relicId === 'treasure_bag') saveData.gold = (saveData.gold || 0) + 150;
        if (relicId === 'ancient_coin') saveData.gold = (saveData.gold || 0) + 500;
        if (relicId === 'small_blood') saveData.playerHp = Math.min((saveData.playerHp || 0) + 10, saveData.maxHp);
        if (relicId === 'apple') saveData.playerHp = Math.min((saveData.playerHp || 0) + 5, saveData.maxHp);
        if (relicId === 'pear') saveData.playerHp = Math.min((saveData.playerHp || 0) + 20, saveData.maxHp);
        if (relicId === 'waffle') saveData.playerHp = saveData.maxHp;

        if (saveData.act === undefined) saveData.act = 1;

        await saveSaveData(saveData);

        localGotRelic = true;

        collectedRelicCount++;

        btn.disabled = true;

        btn.textContent = `✅ 已获得 ${btn.dataset.relicName}`;

        window.showModal(`获得遗物：${btn.dataset.relicName}`, { title: '📿 获得遗物', icon: '📿', borderColor: '#9b59b6' });

        updateUrlParam('gotRelic', '1');

      }



      function goToCardSelect() {

        sessionStorage.setItem('rewardCards', JSON.stringify(reward.cardPool));

        const query =
`char=${encodeURIComponent(char)}&prevNode=${encodeURIComponent(prevNode)}&nextNode=${encodeURIComponent(nextNode)}&node
Type=${encodeURIComponent(nodeType)}&gotGold=${localGotGold ? '1' : '0'}&gotRelic=${localGotRelic ? '1' : '0'}`;

        window.location.href = `card_select.html?${query}`;

      }



      const panel = document.getElementById('reward-panel');

      panel.innerHTML = '';



      const goldBtn = document.createElement('button');

      goldBtn.className = 'reward-btn';

      goldBtn.textContent = `💰 获得金币 +${reward.gold}`;

      if (gotGold) goldBtn.disabled = true;

      goldBtn.addEventListener('click', async () => {

        await giveGold(reward.gold);

        goldBtn.disabled = true;

      });

      panel.appendChild(goldBtn);



      // 宝箱不显示卡牌按钮

      if (nodeType !== 'chest') {

        const cardBtn = document.createElement('button');

        cardBtn.className = 'reward-btn';

        cardBtn.textContent = ' 选择一张卡牌';

        if (gotCard) cardBtn.disabled = true;

        cardBtn.addEventListener('click', goToCardSelect);

        panel.appendChild(cardBtn);

      }

      // Boss 战不给普通遗物，通过独立的三选一界面发放 Boss 遗物
      if (nodeType === 'elite' || nodeType === 'chest') {
        (reward.relics || []).forEach((relicData) => {

          if (!relicData) return;

          const relicBtn = document.createElement('button');

          relicBtn.className = 'reward-btn';

          const relicName = relicData.name || relicData;

          relicBtn.textContent = `📿 获得 ${relicName}`;

          relicBtn.dataset.relicName = relicName;

          if (gotRelic) relicBtn.disabled = true;

          relicBtn.addEventListener('click', async () => {

            await giveRelic(relicData.id || relicData, relicData.effectType, relicData.value || 0, relicBtn);

          });

          panel.appendChild(relicBtn);

        });

      }



      // 跳过按钮：根据节点类型决定去向

      const skipBtn = document.createElement('button');

      skipBtn.className = 'skip-btn';

      skipBtn.textContent = '跳过 →';

      skipBtn.addEventListener('click', goToNextStageOrVictory);

      panel.appendChild(skipBtn);

    })();

  </script>



  <script src="status_bar.js"></script>

</body>

</html>
