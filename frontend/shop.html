<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>商店</title>
  <style>
    body {
      margin: 0; padding-top: 50px;
      background: #1a1a2e; color: #e0e0e0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex; flex-direction: column; align-items: center;
      min-height: 100vh;
    }
    h2 { color: #f1c40f; margin: 20px 0; }
    .gold-display {
      font-size: 20px; background: #16213e; padding: 10px 20px;
      border-radius: 8px; margin-bottom: 20px;
    }
    .section {
      width: 500px; max-width: 95%;
      background: #16213e; border-radius: 12px; padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 0 20px rgba(0,0,0,0.3);
    }
    .section h3 { margin-top: 0; color: #e67e22; }
    .item-list {
      display: flex; gap: 15px; flex-wrap: wrap; justify-content: center;
    }
    .shop-item {
      border: 2px solid #34495e; border-radius: 8px;
      padding: 15px; width: 120px; text-align: center;
      cursor: pointer; transition: all 0.3s;
      background: linear-gradient(135deg, #2c3e50, #34495e);
    }
    .shop-item:hover:not(.sold) { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
    .shop-item.sold {
      opacity: 0.4; cursor: not-allowed;
    }
    .shop-item .price {
      color: #f1c40f; font-weight: bold; margin-top: 8px;
    }
    .delete-list {
      display: flex; flex-wrap: wrap; gap: 10px; justify-content: center;
      max-height: 200px; overflow-y: auto;
    }
    .delete-item {
      border: 1px solid #e74c3c; border-radius: 6px;
      padding: 8px 12px; cursor: pointer; background: rgba(231,76,60,0.1);
      transition: all 0.2s;
    }
    .delete-item:hover { background: rgba(231,76,60,0.3); }
    .delete-item .delete-cost { color: #e74c3c; font-weight: bold; }
    .skip-btn {
      margin: 20px 0 40px;
      background: #e74c3c; color: white; border: none;
      padding: 12px 24px; font-size: 16px; border-radius: 8px;
      cursor: pointer; transition: all 0.3s;
    }
    .skip-btn:hover { background: #c0392b; transform: translateY(-2px); }
  </style>
</head>
<body>
  <script src="status_bar.js"></script>
  <h2>🛒 商 店</h2>
  <div class="gold-display">💰 金币：<span id="gold-amount">0</span></div>

  <!-- 购买卡牌区域 -->
  <div class="section">
    <h3>购买卡牌</h3>
    <div class="item-list" id="buy-cards"></div>
  </div>

  <!-- 购买遗物区域 -->
  <div class="section">
    <h3>购买遗物</h3>
    <div class="item-list" id="buy-relics"></div>
  </div>

  <!-- 删除卡牌区域 -->
  <div class="section">
    <h3>删除卡牌 (75 金币)</h3>
    <div class="delete-list" id="delete-cards"></div>
  </div>

  <button class="skip-btn" id="skip-btn">跳过 →</button>

  <script>
    (function() {
      const params = new URLSearchParams(window.location.search);
      const char = params.get('char') || '1';
      const currentNode = params.get('currentNode') || 'start';
      const nextNode = params.get('nextNode') || currentNode;

      // 商店默认商品
      const defaultCards = [
        { name: '打击', cost: 1, damage: 6, block: 0, type: 'ATTACK', price: 50 },
        { name: '防御', cost: 1, damage: 0, block: 5, type: 'SKILL', price: 50 },
        { name: '重击', cost: 2, damage: 12, block: 0, type: 'ATTACK', price: 80 }
      ];
      const defaultRelic = { name: '古老金币', price: 100 };

      let gold = parseInt(localStorage.getItem('gold') || '0');
      const updateGoldDisplay = () => {
        document.getElementById('gold-amount').textContent = gold;
      };
      updateGoldDisplay();

      // 从 localStorage 同步最新金币
      const syncGold = () => {
        gold = parseInt(localStorage.getItem('gold') || '0');
        updateGoldDisplay();
        if (window.updateStatusBar) window.updateStatusBar();
      };

      // 通用购买函数
      const spendGold = (amount) => {
        if (gold >= amount) {
          gold -= amount;
          localStorage.setItem('gold', gold);
          syncGold();
          return true;
        } else {
          alert('金币不足！');
          return false;
        }
      };

      // 渲染购买卡牌
      const buyCardsDiv = document.getElementById('buy-cards');
      defaultCards.forEach(card => {
        const div = document.createElement('div');
        div.className = 'shop-item';
        div.innerHTML = `
          <div><strong>${card.name}</strong></div>
          <div>🗡️ ${card.damage} 🛡️ ${card.block}</div>
          <div>⚡ ${card.cost}</div>
          <div class="price">${card.price} 💰</div>
        `;
        div.addEventListener('click', () => {
          if (div.classList.contains('sold')) return;
          if (spendGold(card.price)) {
            const deck = JSON.parse(localStorage.getItem('deck') || '[]');
            deck.push({ name: card.name, cost: card.cost, damage: card.damage, block: card.block, type: card.type });
            localStorage.setItem('deck', JSON.stringify(deck));
            alert(`购买成功：${card.name}`);
            div.classList.add('sold');
          }
        });
        buyCardsDiv.appendChild(div);
      });

      // 渲染购买遗物
      const buyRelicsDiv = document.getElementById('buy-relics');
      const relicDiv = document.createElement('div');
      relicDiv.className = 'shop-item';
      relicDiv.innerHTML = `
        <div>📿 ${defaultRelic.name}</div>
        <div class="price">${defaultRelic.price} 💰</div>
      `;
      relicDiv.addEventListener('click', () => {
        if (relicDiv.classList.contains('sold')) return;
        if (spendGold(defaultRelic.price)) {
          const relics = JSON.parse(localStorage.getItem('relics') || '[]');
          relics.push(defaultRelic.name);
          localStorage.setItem('relics', JSON.stringify(relics));
          alert(`购买成功：${defaultRelic.name}`);
          relicDiv.classList.add('sold');
        }
      });
      buyRelicsDiv.appendChild(relicDiv);

      // 渲染删除卡牌列表
      const deleteDiv = document.getElementById('delete-cards');
      const deck = JSON.parse(localStorage.getItem('deck') || '[]');
      if (deck.length === 0) {
        deleteDiv.innerHTML = '<p style="color:#aaa;">卡组为空</p>';
      } else {
        deck.forEach((card, index) => {
          const span = document.createElement('span');
          span.className = 'delete-item';
          span.innerHTML = `${card.name} <span class="delete-cost">-75💰</span>`;
          span.addEventListener('click', () => {
            if (spendGold(75)) {
              const currentDeck = JSON.parse(localStorage.getItem('deck') || '[]');
              currentDeck.splice(index, 1);
              localStorage.setItem('deck', JSON.stringify(currentDeck));
              alert(`删除了 ${card.name}`);
              // 重新加载页面以刷新列表
              location.reload();
            }
          });
          deleteDiv.appendChild(span);
        });
      }

      // 跳过按钮
      document.getElementById('skip-btn').addEventListener('click', () => {
        window.location.href = `map.html?char=${char}&currentNode=${encodeURIComponent(nextNode)}`;
      });
    })();
  </script>
</body>
</html>
