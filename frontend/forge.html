<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>锻造</title>
  <script src="save_helper.js"></script>
  <script src="card_ui.js"></script>
  <style>
    body { margin: 0; padding-top: 50px; background: #1a1a2e; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; }
    h2 { color: #f1c40f; }
    .card-list { display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; max-width: 600px; margin-top: 20px; }
    .card { width: 140px; padding: 20px; border: 2px solid #34495e; border-radius: 8px; text-align: center; cursor: pointer; color: white; }
    .card:hover { transform: scale(1.05); }
    .card.attack { border-left: 5px solid #e74c3c; }
    .card.skill  { border-left: 5px solid #3498db; }
    .card.power  { border-left: 5px solid #2ecc71; }
    .card .card-type-label { font-size: 10px; color: #ccc; margin-top: 2px; }
    .back-btn { margin-top: 30px; background: #e74c3c; color: white; border: none; padding: 12px 24px; border-radius: 8px; cursor: pointer; }
  </style>
</head>
<body>
  <h2>🔨 选择一张卡牌进行锻造</h2>
  <div class="card-list" id="card-list"></div>
  <button class="back-btn" id="back-btn">返回篝火</button>

  <script>
    (async function() {
      const params = new URLSearchParams(window.location.search);
      const char = params.get('char') || '1';
      const nextNode = params.get('nextNode') || 'start';

      let saveData = await loadSaveData(char);
      const upgradeable = saveData.deck.filter(card => !card.upgraded);
      const listDiv = document.getElementById('card-list');

      if (upgradeable.length === 0) {
        listDiv.innerHTML = '<div>没有可锻造的卡牌</div>';
      } else {
        upgradeable.forEach(card => {
          const div = document.createElement('div');
          div.className = `card ${CARD_UI.getCardTypeClass(card)}`;
          div.style.background = CARD_UI.getCardCharStyle(card);
          const typeLabel = CARD_UI.getCardTypeLabel(card);
          div.innerHTML = `<h3>${card.name}</h3><p>⚡${card.cost}</p><div class="card-type-label">${typeLabel}</div><p style="font-size:12px;color:#ecf0f1;">${CARD_UI.getCardEffectText(card)}</p>`;
          var _eff = CARD_UI.getCardEffects(card); CARD_UI.bindTooltip(div, _eff.length > 0 ? _eff[0].type : null);
          div.addEventListener('click', async () => {
            saveData = await loadSaveData(char); 
            const idx = saveData.deck.findIndex(c => c.name === card.name && !c.upgraded);
            if (idx !== -1) {
              const baseCard = saveData.deck[idx];
              const baseId = baseCard.id;
              if (baseId) {
                const upgradedId = baseId + '+';
                try {
                  const resp = await fetch(`/api/card/${encodeURIComponent(upgradedId)}`);
                  if (resp.ok) {
                    const upgradedCardData = await resp.json();
                    saveData.deck[idx] = upgradedCardData;
                    await saveSaveData(saveData);
                    alert('升级成功！');
                    sessionStorage.setItem('campfireAction', 'forge');
                    window.location.href = `campfire.html?char=${char}&nextNode=${encodeURIComponent(nextNode)}`;
                    return;
                  }
                } catch (e) {
                  console.warn('无法获取升级模板', e);
                }
              }
              // 如果后端获取失败，不进行手动升级，直接提示
              alert('无法升级该卡牌（缺少升级模板）');
            }
          });
          listDiv.appendChild(div);
        });
      }

      document.getElementById('back-btn').addEventListener('click', () => {
        window.location.href = `campfire.html?char=${char}&nextNode=${encodeURIComponent(nextNode)}`;
      });
    })();
  </script>
</body>
</html>
