<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>问号事件</title>
  <style>
    body {
      margin: 0; padding-top: 50px;
      background: #1a1a2e; color: #e0e0e0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex; flex-direction: column; align-items: center;
      min-height: 100vh;
      position: relative;
    }
    .event-background {
      width: 100%; height: 250px;
      display: flex; align-items: center; justify-content: center;
      font-size: 80px;
      color: white;
      text-shadow: 0 0 20px rgba(0,0,0,0.8);
    }
    .event-text {
      max-width: 600px; padding: 20px; text-align: center;
      font-size: 18px; line-height: 1.6;
      background: rgba(0,0,0,0.4); border-radius: 12px;
      margin: 20px;
    }
    .options {
      display: flex; gap: 30px; margin-top: 20px;
    }
    .option-btn {
      padding: 15px 30px; font-size: 16px; border: none; border-radius: 8px;
      cursor: pointer; transition: all 0.3s; background: #e67e22; color: white;
      max-width: 200px;
    }
    .option-btn:hover { background: #d35400; transform: translateY(-2px); }
  </style>
</head>
<body>
  <script src="status_bar.js"></script>
  <div class="event-background" id="event-bg"></div>
  <div class="event-text" id="event-description"></div>
  <div class="options" id="options-container"></div>

  <script>
    (function() {
      const params = new URLSearchParams(window.location.search);
      const char = params.get('char') || '1';
      const currentNode = params.get('currentNode') || 'start';
      const nextNode = params.get('nextNode') || currentNode;

      // 随机事件列表（可自由扩充）
      const events = [
        {
          id: 'ancient_ruins',
          title: '古老遗迹',
          background: 'linear-gradient(135deg, #4a3f2e, #2e2416)',
          icon: '🏛️',
          description: '你发现了一座古老的遗迹，地上散落着金币和一件遗物，但空气中弥漫着危险的气息。',
          options: [
            {
              text: '小心收集金币',
              action: () => {
                let gold = parseInt(localStorage.getItem('gold') || '0');
                gold += 50;
                localStorage.setItem('gold', gold);
                alert('获得 50 金币！');
              }
            },
            {
              text: '冒险深入探寻',
              action: () => {
                let hp = parseInt(localStorage.getItem('playerHP') || '70');
                hp = Math.max(1, hp - 10); // 至少保留1点生命
                localStorage.setItem('playerHP', hp);
                const relics = JSON.parse(localStorage.getItem('relics') || '[]');
                relics.push('古老遗物');
                localStorage.setItem('relics', JSON.stringify(relics));
                alert('失去 10 点生命，获得古老遗物！');
              }
            }
          ]
        },
        {
          id: 'wandering_merchant',
          title: '流浪商人',
          background: 'linear-gradient(135deg, #3d5a3c, #1e3b1e)',
          icon: '🧑‍🌾',
          description: '一个流浪商人出现在你面前，他愿意用生命精华交换你的金币。',
          options: [
            {
              text: '购买生命精华（-30💰，+15❤️）',
              action: () => {
                let gold = parseInt(localStorage.getItem('gold') || '0');
                if (gold >= 30) {
                  gold -= 30;
                  localStorage.setItem('gold', gold);
                  let hp = parseInt(localStorage.getItem('playerHP') || '70');
                  let maxHp = parseInt(localStorage.getItem('maxHP') || '70');
                  hp = Math.min(maxHp, hp + 15);
                  localStorage.setItem('playerHP', hp);
                  alert('消耗 30 金币，恢复 15 点生命！');
                } else {
                  alert('金币不足，无法购买！');
                  return; // 金币不足时不跳转，让玩家重选
                }
              }
            },
            {
              text: '拒绝交易',
              action: () => {
                alert('你无视了商人，继续前行。');
              }
            }
          ]
        },
        {
          id: 'cursed_altar',
          title: '诅咒祭坛',
          background: 'linear-gradient(135deg, #4a1a3a, #2e0e26)',
          icon: '🗿',
          description: '你遇到一座被诅咒的祭坛，上面放着一本散发邪气的卷轴。',
          options: [
            {
              text: '阅读卷轴（-5❤️，获得一张随机卡牌）',
              action: () => {
                let hp = parseInt(localStorage.getItem('playerHP') || '70');
                hp = Math.max(1, hp - 5);
                localStorage.setItem('playerHP', hp);
                // 随机给一张基础卡牌
                const randomCards = [
                  { name: '打击', cost: 1, damage: 6, block: 0, type: 'ATTACK' },
                  { name: '防御', cost: 1, damage: 0, block: 5, type: 'SKILL' },
                  { name: '重击', cost: 2, damage: 12, block: 0, type: 'ATTACK' }
                ];
                const card = randomCards[Math.floor(Math.random() * randomCards.length)];
                const deck = JSON.parse(localStorage.getItem('deck') || '[]');
                deck.push(card);
                localStorage.setItem('deck', JSON.stringify(deck));
                alert(`失去 5 点生命，获得卡牌【${card.name}】！`);
              }
            },
            {
              text: '转身离开',
              action: () => {
                alert('你安全地离开了祭坛。');
              }
            }
          ]
        }
      ];

      // 随机选择一个事件
      const event = events[Math.floor(Math.random() * events.length)];

      // 渲染背景
      const bgDiv = document.getElementById('event-bg');
      bgDiv.style.background = event.background;
      bgDiv.innerHTML = `<span>${event.icon}</span>`;

      // 渲染描述
      document.getElementById('event-description').textContent = event.description;

      // 渲染选项按钮
      const optionsDiv = document.getElementById('options-container');
      event.options.forEach((opt, index) => {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.textContent = opt.text;
        btn.addEventListener('click', () => {
          // 执行选项动作（可能包含金币不足等情况，会直接 return 不跳转）
          const result = opt.action();
          if (result === false) return; // 如果动作返回 false，则不跳转（如金币不足）
          // 更新状态栏
          if (window.updateStatusBar) window.updateStatusBar();
          // 跳回地图，前进到 nextNode
          window.location.href = `map.html?char=${char}&currentNode=${encodeURIComponent(nextNode)}`;
        });
        optionsDiv.appendChild(btn);
      });
    })();
  </script>
</body>
</html>
