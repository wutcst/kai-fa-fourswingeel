<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>杀戮尖塔 - 地图</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #0a0a1a;
      color: #e0e0e0;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
    }
    #map-container {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: flex-end;
      padding-bottom: 20px;
    }
    svg#lines {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }
    .node {
      position: absolute;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.3s;
      font-size: 12px;
      font-weight: bold;
      text-transform: uppercase;
      color: white;
      border: 3px solid #444;
      background: rgba(20, 20, 40, 0.9);
      backdrop-filter: blur(4px);
      z-index: 2;
    }
    .node.current {
      border-color: #f1c40f;
      box-shadow: 0 0 20px #f1c40f;
      background: rgba(241, 196, 15, 0.3);
      color: #fff;
    }
    .node.clickable {
      border-color: #e74c3c;
      animation: pulse 1.5s infinite;
    }
    .node.disabled {
      opacity: 0.4;
      cursor: not-allowed;
      border-color: #333;
      background: rgba(20, 20, 40, 0.4);
    }
    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(231, 76, 60, 0.7); }
      70% { box-shadow: 0 0 0 15px rgba(231, 76, 60, 0); }
      100% { box-shadow: 0 0 0 0 rgba(231, 76, 60, 0); }
    }
    .node .icon { font-size: 28px; }
    .node .label { font-size: 10px; margin-top: 2px; }
    /* 连线 */
    line {
      stroke: #555;
      stroke-width: 3;
      stroke-linecap: round;
      transition: stroke 0.3s;
    }
    .info-bar {
      position: fixed;
      bottom: 20px;
      left: 20px;
      background: rgba(0,0,0,0.7);
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 14px;
      z-index: 10;
    }
    .btn-return {
      position: fixed;
      top: 20px;
      right: 20px;
      background: #e74c3c;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 6px;
      cursor: pointer;
      z-index: 10;
    }
  </style>
</head>
<body>
  <div id="map-container">
    <svg id="lines"></svg>
  </div>
  <div class="info-bar">
    <span>当前位置：<strong id="current-node-label">起点</strong></span>
  </div>

  <script>
    (function() {
      // ===== 默认地图数据 =====
      const defaultMap = {
        nodes: [
          { id: 'start', type: 'start', label: '起点', x: 50, y: 90, icon: '🛡️' },
          // 行1 (y=70)
          { id: 'm1', type: 'monster', label: '小怪', x: 25, y: 70, icon: '👾' },
          { id: 'e1', type: 'elite', label: '精英', x: 50, y: 70, icon: '💀' },
          { id: 'm2', type: 'monster', label: '小怪', x: 75, y: 70, icon: '👾' },
          // 行2 (y=50)
          { id: 'm3', type: 'monster', label: '小怪', x: 25, y: 50, icon: '👾' },
          { id: 'chest1', type: 'chest', label: '宝箱', x: 50, y: 50, icon: '📦' },
          { id: 'q1', type: 'question', label: '?', x: 75, y: 50, icon: '❓' },
          // 行3 (y=30)
          { id: 'e2', type: 'elite', label: '精英', x: 37.5, y: 30, icon: '💀' },
          { id: 'm4', type: 'monster', label: '小怪', x: 62.5, y: 30, icon: '👾' },
          // 行4 boss (y=10)
          { id: 'boss', type: 'boss', label: 'BOSS', x: 50, y: 10, icon: '👑' }
        ],
        edges: [
          // 起点连接行1
          { from: 'start', to: 'm1' },
          { from: 'start', to: 'e1' },
          { from: 'start', to: 'm2' },
          // 行1 -> 行2
          { from: 'm1', to: 'm3' },
          { from: 'm1', to: 'chest1' },
          { from: 'e1', to: 'chest1' },
          { from: 'e1', to: 'q1' },
          { from: 'm2', to: 'q1' },
          // 行2 -> 行3
          { from: 'm3', to: 'e2' },
          { from: 'chest1', to: 'e2' },
          { from: 'chest1', to: 'm4' },
          { from: 'q1', to: 'm4' },
          // 行3 -> boss
          { from: 'e2', to: 'boss' },
          { from: 'm4', to: 'boss' }
        ]
      };

      // ===== 从URL获取玩家当前节点，默认为起点 =====
      const params = new URLSearchParams(window.location.search);
      let currentNodeId = params.get('currentNode') || 'start';
      const charParam = params.get('char') || '1'; // 保留角色参数

      // ===== 初始化 =====
      const container = document.getElementById('map-container');
      const svg = document.getElementById('lines');
      const currentLabel = document.getElementById('current-node-label');

      // 根据节点ID查找节点
      function getNodeById(id) {
        return defaultMap.nodes.find(n => n.id === id);
      }

      // 获取从当前节点出发的可达节点ID列表
      function getNextNodes(fromId) {
        return defaultMap.edges
          .filter(e => e.from === fromId)
          .map(e => e.to);
      }

      // 获取可达节点
      const nextNodeIds = getNextNodes(currentNodeId);
      const currentNode = getNodeById(currentNodeId);
      if (currentNode) {
        currentLabel.textContent = currentNode.label || currentNode.id;
      }

      // ===== 绘制节点和连线 =====
      function draw() {
        // 清除旧节点
        container.querySelectorAll('.node').forEach(n => n.remove());
        // 清除旧连线
        svg.innerHTML = '';

        // 画所有连线（根据玩家位置高亮可走路径）
        defaultMap.edges.forEach(edge => {
          const fromNode = getNodeById(edge.from);
          const toNode = getNodeById(edge.to);
          if (fromNode && toNode) {
            const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
            line.setAttribute("x1", `${fromNode.x}%`);
            line.setAttribute("y1", `${fromNode.y}%`);
            line.setAttribute("x2", `${toNode.x}%`);
            line.setAttribute("y2", `${toNode.y}%`);
            // 如果这条边是从当前节点出发的，高亮显示
            if (edge.from === currentNodeId && nextNodeIds.includes(edge.to)) {
              line.setAttribute("stroke", "#e74c3c");
              line.setAttribute("stroke-width", "4");
              line.classList.add("active-path");
            } else {
              line.setAttribute("stroke", "#555");
              line.setAttribute("stroke-width", "2");
            }
            svg.appendChild(line);
          }
        });

        // 画所有节点
        defaultMap.nodes.forEach(node => {
          const div = document.createElement('div');
          div.className = 'node';
          div.style.left = `${node.x - 3}%`; // 偏移使中心对齐
          div.style.top = `${node.y - 3}%`;
          div.innerHTML = `<span class="icon">${node.icon}</span><span class="label">${node.label}</span>`;

          // 判断状态
          if (node.id === currentNodeId) {
            div.classList.add('current');
          } else if (nextNodeIds.includes(node.id)) {
            // 可点击的下一个节点
            div.classList.add('clickable');
            div.addEventListener('click', () => handleNodeClick(node));
          } else {
            div.classList.add('disabled');
          }

          container.appendChild(div);
        });
      }

      // ===== 处理节点点击 =====
      function handleNodeClick(node) {
        // 仅战斗类型跳转到战斗页面，其他类型暂时提示
        if (node.type === 'monster' || node.type === 'elite' || node.type === 'boss') {
          // 构造跳转URL，带上当前节点、目标节点、角色参数
          const url = `index.html?from=map&prevNode=${encodeURIComponent(currentNodeId)}&nextNode=${encodeURIComponent(node.id)}&nodeType=${node.type}&char=${charParam}`;
          window.location.href = url;
        } else if (node.type === 'chest' || node.type === 'question') {
          alert('宝箱/问号事件尚未开放，敬请期待！');
        } else if (node.type === 'start') {
          // 起点不跳转
          return;
        }
      }

      draw();

      // 可选：返回封面按钮
      const returnBtn = document.createElement('button');
      returnBtn.className = 'btn-return';
      returnBtn.textContent = '返回封面';
      returnBtn.onclick = () => {
        window.location.href = `cover.html?char=${charParam}`;
      };
      document.body.appendChild(returnBtn);

    })();
  </script>
</body>
</html>
