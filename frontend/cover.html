<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>杀戮尖塔克隆 - 角色选择</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #0d0d1a;
      color: #e0e0e0;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
    }

    /* 封面页 */
    #cover-screen {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: radial-gradient(circle at center, #1a1a3e 0%, #0a0a1a 100%);
      z-index: 10;
    }

    #cover-screen h1 {
      font-size: 3em;
      margin-bottom: 40px;
      text-shadow: 0 0 20px #e74c3c;
      letter-spacing: 4px;
    }

    .btn {
      padding: 16px 40px;
      font-size: 20px;
      font-weight: bold;
      border: 2px solid #e74c3c;
      background: transparent;
      color: #e74c3c;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .btn:hover {
      background: #e74c3c;
      color: white;
      box-shadow: 0 0 25px #e74c3c;
      transform: scale(1.05);
    }

    /* 角色选择页 */
    #character-screen {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      display: none; /* 默认隐藏 */
      flex-direction: column;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      transition: background-image 0.5s ease;
      background-color: #111; /* 未选角色时底色 */
    }

    /* 底部角色选择条 */
    .character-bar {
      position: absolute;
      bottom: 30px;
      left: 0;
      width: 100%;
      display: flex;
      justify-content: center;
      gap: 30px;
      padding: 0 20px;
      z-index: 5;
    }

    .char-btn {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      border: 3px solid #555;
      background: rgba(20, 20, 40, 0.85);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.3s ease;
      font-size: 14px;
      font-weight: bold;
      text-transform: uppercase;
      color: #ccc;
      backdrop-filter: blur(4px);
    }

    .char-btn.active {
      border-color: #e74c3c;
      background: rgba(231, 76, 60, 0.3);
      color: white;
      box-shadow: 0 0 25px #e74c3c;
    }

    .char-btn.disabled {
      opacity: 0.4;
      cursor: not-allowed;
      border-color: #333;
      background: rgba(20, 20, 40, 0.6);
    }

    .char-btn .char-icon {
      font-size: 36px;
      margin-bottom: 4px;
    }

    /* 右下角开始游戏按钮 */
    .start-game-btn {
      position: absolute;
      bottom: 40px;
      right: 40px;
      background: #e74c3c;
      color: white;
      border: none;
      padding: 18px 36px;
      font-size: 22px;
      font-weight: bold;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(0,0,0,0.5);
      z-index: 5;
      letter-spacing: 2px;
    }

    .start-game-btn:hover {
      background: #ff5e4d;
      transform: translateY(-3px);
      box-shadow: 0 8px 25px rgba(231, 76, 60, 0.5);
    }

    .start-game-btn:disabled {
      background: #555;
      color: #aaa;
      cursor: not-allowed;
      box-shadow: none;
      transform: none;
    }

    /* 响应式调整 */
    @media (max-width: 600px) {
      #cover-screen h1 { font-size: 2em; }
      .btn { padding: 12px 30px; font-size: 18px; }
      .char-btn { width: 70px; height: 70px; }
      .start-game-btn { bottom: 30px; right: 20px; padding: 14px 28px; font-size: 18px; }
    }
  </style>
</head>
<body>

  <!-- 封面页 -->
  <div id="cover-screen">
    <h1>⚔️ 杀戮尖塔</h1>
    <button class="btn" id="select-character-btn">选择角色</button>
  </div>

  <!-- 角色选择页 -->
  <div id="character-screen">
    <div class="character-bar">
      <!-- 角色 1 -->
      <div class="char-btn" id="char1-btn" data-char="1">
        <span class="char-icon">🦾</span>
        <span>铁甲战士</span>
      </div>
      <!-- 角色 2 预留位置，当前禁用 -->
      <div class="char-btn disabled" id="char2-btn" data-char="2">
        <span class="char-icon">❓</span>
        <span>???</span>
      </div>
    </div>

    <button class="start-game-btn" id="start-game-btn" disabled>开始游戏</button>
  </div>

  <script>
    (function() {
      const coverScreen = document.getElementById('cover-screen');
      const charScreen = document.getElementById('character-screen');
      const selectBtn = document.getElementById('select-character-btn');
      const char1Btn = document.getElementById('char1-btn');
      const char2Btn = document.getElementById('char2-btn'); // 预留，但禁用
      const startBtn = document.getElementById('start-game-btn');

      let selectedCharacter = null;

      // 角色背景图片（可替换为实际图片路径）
      const characterBackgrounds = {
        '1': 'https://picsum.photos/seed/ironclad/1200/800',   // 示例图，替换为铁甲战士图片
        '2': 'https://picsum.photos/seed/silent/1200/800'      // 后续角色2图片
      };

      // 切换到角色选择界面
      selectBtn.addEventListener('click', () => {
        coverScreen.style.display = 'none';
        charScreen.style.display = 'flex';
      });

      // 点击角色1
      char1Btn.addEventListener('click', () => {
        // 移除非禁用的其他角色激活状态
        [char1Btn].forEach(b => b.classList.remove('active')); // 目前只有角色1
        char1Btn.classList.add('active');
        selectedCharacter = '1';

        // 更换背景为角色1图片
        charScreen.style.backgroundImage = `url('${characterBackgrounds['1']}')`;

        // 启用开始游戏按钮
        startBtn.disabled = false;
      });

      // 角色2目前是禁用的，不绑定点击事件（或绑定但不做反应）
      char2Btn.addEventListener('click', (e) => {
        // 可在此处添加提示“该角色未解锁”
        alert('角色2尚未开放，敬请期待！');
      });

      // 开始游戏
      startBtn.addEventListener('click', () => {
        if (!selectedCharacter) {
          alert('请先选择一个角色！');
          return;
        }
        // 跳转到游戏主界面，可附带角色参数（如 ?char=1）
        // 跳转到地图页面，携带角色参数
        window.location.href = `map.html?char=${selectedCharacter}`;
      });

      // 初始隐藏角色选择页，显示封面
      charScreen.style.display = 'none';
    })();
  </script>

</body>
</html>
