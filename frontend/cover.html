<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>杀戮尖塔克隆 - 角色选择</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0d0d1a; color: #e0e0e0; overflow: hidden; height: 100vh; width: 100vw; }
    #cover-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: radial-gradient(circle at center, #1a1a3e 0%, #0a0a1a 100%); z-index: 10; }
    #cover-screen h1 { font-size: 3em; margin-bottom: 40px; text-shadow: 0 0 20px #e74c3c; letter-spacing: 4px; }
    .btn { padding: 16px 40px; font-size: 20px; font-weight: bold; border: 2px solid #e74c3c; background: transparent; color: #e74c3c; border-radius: 8px; cursor: pointer; transition: all 0.3s ease; text-transform: uppercase; letter-spacing: 2px; }
    .btn:hover { background: #e74c3c; color: white; box-shadow: 0 0 25px #e74c3c; transform: scale(1.05); }
    #character-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; flex-direction: column; background-size: cover; background-position: center; background-repeat: no-repeat; transition: background-image 0.5s ease; background-color: #111; }
    .character-bar { position: absolute; bottom: 30px; left: 0; width: 100%; display: flex; justify-content: center; gap: 30px; padding: 0 20px; z-index: 5; }
    .char-btn { width: 90px; height: 90px; border-radius: 50%; border: 3px solid #555; background: rgba(20, 20, 40, 0.85); display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; transition: all 0.3s ease; font-size: 14px; font-weight: bold; text-transform: uppercase; color: #ccc; backdrop-filter: blur(4px); }
    .char-btn.active { border-color: #e74c3c; background: rgba(231, 76, 60, 0.3); color: white; box-shadow: 0 0 25px #e74c3c; }
    .char-btn.disabled { opacity: 0.4; cursor: not-allowed; border-color: #333; background: rgba(20, 20, 40, 0.6); }
    .char-btn .char-icon { font-size: 36px; margin-bottom: 4px; }
    .start-game-btn, .test-btn { position: absolute; right: 40px; background: #e74c3c; color: white; border: none; padding: 18px 36px; font-size: 22px; font-weight: bold; border-radius: 8px; cursor: pointer; transition: all 0.3s ease; box-shadow: 0 4px 15px rgba(0,0,0,0.5); z-index: 5; letter-spacing: 2px; }
    .start-game-btn { bottom: 40px; }
    .test-btn { bottom: 120px; background: #3498db; }
    .start-game-btn:hover, .test-btn:hover { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(231, 76, 60, 0.5); }
    .start-game-btn:disabled, .test-btn:disabled { background: #555; color: #aaa; cursor: not-allowed; box-shadow: none; transform: none; }
    @media (max-width: 600px) { #cover-screen h1 { font-size: 2em; } .btn { padding: 12px 30px; font-size: 18px; } .char-btn { width: 70px; height: 70px; } .start-game-btn, .test-btn { right: 20px; padding: 14px 28px; font-size: 18px; } .test-btn { bottom: 100px; } .start-game-btn { bottom: 30px; } }
  </style>
</head>
<body>
  <div id="cover-screen">
    <h1>⚔️ 杀戮尖塔</h1>
    <button class="btn" id="select-character-btn">选择角色</button>
  </div>

  <div id="character-screen">
    <div class="character-bar">
      <div class="char-btn" id="char1-btn" data-char="1">
        <span class="char-icon">🦾</span><span>铁甲战士</span>
      </div>
      <div class="char-btn disabled" id="char2-btn" data-char="2">
        <span class="char-icon">❓</span><span>???</span>
      </div>
    </div>
    <button class="test-btn" id="test-btn" disabled>开始测试</button>
    <button class="start-game-btn" id="start-game-btn" disabled>开始游戏</button>
  </div>

  <script>
    (function() {
      const coverScreen = document.getElementById('cover-screen');
      const charScreen = document.getElementById('character-screen');
      const selectBtn = document.getElementById('select-character-btn');
      const char1Btn = document.getElementById('char1-btn');
      const char2Btn = document.getElementById('char2-btn');
      const startBtn = document.getElementById('start-game-btn');
      const testBtn = document.getElementById('test-btn');

      let selectedCharacter = null;
      const characterBackgrounds = {
        '1': 'https://picsum.photos/seed/ironclad/1200/800',
        '2': 'https://picsum.photos/seed/silent/1200/800'
      };

      selectBtn.addEventListener('click', () => {
        coverScreen.style.display = 'none';
        charScreen.style.display = 'flex';
      });

      function selectChar(charId) {
        selectedCharacter = charId;
        document.querySelectorAll('.char-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('char' + charId + '-btn').classList.add('active');
        charScreen.style.backgroundImage = `url('${characterBackgrounds[charId]}')`;
        startBtn.disabled = false;
        testBtn.disabled = false;
      }

      char1Btn.addEventListener('click', () => selectChar('1'));
      char2Btn.addEventListener('click', () => alert('角色2尚未开放，敬请期待！'));

      function setDefaultPlayerData(charId) {
        localStorage.setItem('char', charId);
        localStorage.setItem('playerHP', '70');
        localStorage.setItem('maxHP', '70');
        localStorage.setItem('gold', '0');
        localStorage.setItem('relics', '[]');
        const startingDeck = [
          { name: '打击', cost: 1, damage: 6, block: 0, type: 'ATTACK' },
          { name: '打击', cost: 1, damage: 6, block: 0, type: 'ATTACK' },
          { name: '打击', cost: 1, damage: 6, block: 0, type: 'ATTACK' },
          { name: '防御', cost: 1, damage: 0, block: 5, type: 'SKILL' },
          { name: '防御', cost: 1, damage: 0, block: 5, type: 'SKILL' }
        ];
        localStorage.setItem('deck', JSON.stringify(startingDeck));
        localStorage.setItem('visitedNodes', '["start"]');
      }

      // 开始游戏（调用后端）
      startBtn.addEventListener('click', async () => {
        if (!selectedCharacter) { alert('请先选择一个角色！'); return; }
        startBtn.disabled = true;
        try {
          const resp = await fetch(`/api/character/${selectedCharacter}`);
          if (!resp.ok) throw new Error('获取角色数据失败');
          const charData = await resp.json();
          localStorage.setItem('char', selectedCharacter);
          localStorage.setItem('playerHP', charData.maxHp);
          localStorage.setItem('maxHP', charData.maxHp);
          localStorage.setItem('gold', charData.gold);
          localStorage.setItem('relics', '[]');
          localStorage.setItem('deck', JSON.stringify(charData.startingDeck));
          localStorage.setItem('visitedNodes', '["start"]');
          localStorage.removeItem('startRelicDone');   // 重置起点遗物状态
          sessionStorage.setItem('mapMode', 'api');
          window.location.href = `map.html?char=${selectedCharacter}`;
        } catch (e) {
          console.error(e);
          alert('初始化角色失败，请检查后端服务！');
        } finally {
          startBtn.disabled = false;
        }
      });

      // 开始测试（使用默认数据）
      testBtn.addEventListener('click', () => {
        if (!selectedCharacter) { alert('请先选择一个角色！'); return; }
        setDefaultPlayerData(selectedCharacter);
        localStorage.removeItem('startRelicDone');   // 重置起点遗物状态
        sessionStorage.setItem('mapMode', 'default');
        window.location.href = `map.html?char=${selectedCharacter}&currentNode=start`;
      });

      charScreen.style.display = 'none';
    })();
  </script>
</body>
</html>
