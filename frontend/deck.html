<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>卡组</title>
  <style>
    body {
      margin: 0; padding-top: 50px;
      background: #1a1a2e; color: #e0e0e0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex; flex-direction: column; align-items: center;
      min-height: 100vh;
    }
    h2 {
      color: #f1c40f; margin: 30px 0 20px;
    }
    .deck-table {
      width: 500px; max-width: 95%;
      border-collapse: collapse;
      background: #16213e; border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }
    .deck-table th {
      background: #0f3460; padding: 12px; text-align: left;
      font-weight: bold; color: #f1c40f;
    }
    .deck-table td {
      padding: 10px 12px; border-bottom: 1px solid #2c3e50;
    }
    .deck-table tr:last-child td { border-bottom: none; }
    .empty {
      color: #aaa; margin-top: 40px; font-size: 18px;
    }
    .back-btn {
      margin-top: 30px;
      background: #e74c3c; color: white; border: none;
      padding: 10px 24px; font-size: 16px; border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s;
    }
    .back-btn:hover { background: #c0392b; transform: translateY(-2px); }
  </style>
</head>
<body>
  <script src="status_bar.js"></script>
  <h2>🃏 当前卡组</h2>
  <div id="deck-container">
    <!-- 动态生成表格 -->
  </div>
  <button class="back-btn" onclick="history.back()">返回</button>

  <script>
    (function() {
      const deck = JSON.parse(localStorage.getItem('deck') || '[]');
      const container = document.getElementById('deck-container');
      if (deck.length === 0) {
        container.innerHTML = '<div class="empty">卡组为空</div>';
        return;
      }
      // 按费用排序
      deck.sort((a, b) => a.cost - b.cost);
      let html = '<table class="deck-table"><thead><tr><th>名称</th><th>费用</th><th>伤害</th><th>格挡</th><th>类型</th></tr></thead><tbody>';
      deck.forEach(card => {
        html += `<tr>
          <td>${card.name}</td>
          <td>⚡ ${card.cost}</td>
          <td>${card.damage > 0 ? `🗡️ ${card.damage}` : '-'}</td>
          <td>${card.block > 0 ? `🛡️ ${card.block}` : '-'}</td>
          <td>${card.type === 'ATTACK' ? '攻击' : '技能'}</td>
        </tr>`;
      });
      html += '</tbody></table>';
      container.innerHTML = html;
    })();
  </script>
</body>
</html>
