<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>卡组</title>
  <script src="save_helper.js"></script>
  <script src="card_ui.js"></script>
  <style>
    body {
      margin: 0; padding-top: 50px;
      background: #1a1a2e; color: #e0e0e0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex; flex-direction: column; align-items: center;
      min-height: 100vh;
    }
    h2 { color: #f1c40f; margin: 30px 0 20px; }
    .deck-table {
      width: 600px; max-width: 95%;
      border-collapse: collapse;
      background: #16213e; border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }
    .deck-table th {
      background: #0f3460; padding: 12px; text-align: left;
      font-weight: bold; color: #f1c40f;
    }
    .deck-table td {
      padding: 10px 12px; border-bottom: 1px solid #2c3e50;
    }
    .deck-table tr:last-child td { border-bottom: none; }
    .deck-table tr:hover { background: rgba(255,255,255,0.05); }
    .empty { color: #aaa; margin-top: 40px; font-size: 18px; }
    .back-btn {
      margin-top: 30px;
      background: #e74c3c; color: white; border: none;
      padding: 10px 24px; font-size: 16px; border-radius: 8px;
      cursor: pointer; transition: all 0.3s;
    }
    .back-btn:hover { background: #c0392b; transform: translateY(-2px); }
  </style>
</head>
<body>
  <h2>🃏 当前卡组</h2>
  <div id="deck-container">
    <div class="empty">加载中...</div>
  </div>
  <button class="back-btn" onclick="history.back()">返回</button>

  <script>
    (async function() {
      const params = new URLSearchParams(window.location.search);
      const char = params.get('char') || '1';
      const saveData = await loadSaveData(char);
      const deck = saveData.deck || [];

      const container = document.getElementById('deck-container');
      if (deck.length === 0) {
        container.innerHTML = '<div class="empty">卡组为空</div>';
        return;
      }

      deck.sort((a, b) => a.cost - b.cost);

      let html = '<table class="deck-table"><thead><tr><th>名称</th><th>费用</th><th>类型</th><th>效果</th></tr></thead><tbody>';
      deck.forEach(card => {
        const bgStyle = CARD_UI.getCardCharStyle(card);
        html += `<tr style="background:${bgStyle.replace('background:','')}; color:white;">
          <td>${card.name}</td>
          <td>⚡ ${card.cost}</td>
          <td>${card.type === 'ATTACK' ? '攻击' : card.type === 'SKILL' ? '技能' : '能力'}</td>
          <td style="font-size:13px;color:#ecf0f1;">${CARD_UI.getCardEffectText(card)}</td>
        </tr>`;
      });
      html += '</tbody></table>';
      container.innerHTML = html;

      const tbody = container.querySelector('tbody');
      if (tbody) {
        tbody.querySelectorAll('tr').forEach((row, i) => {
          CARD_UI.bindTooltip(row, deck[i]?.applyStatusType);
        });
      }
    })();
  </script>

  <script src="status_bar.js"></script>
</body>
</html>
