<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>篝火</title>
  <script src="card_ui.js"></script>
  <script src="save_helper.js"></script>
  <style>
    body {
      margin: 0; padding-top: 50px; /* 为状态栏留空 */
      background: #1a1a2e; color: #e0e0e0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex; flex-direction: column; align-items: center;
      min-height: 100vh; position: relative;
    }
    .campfire-bg {
      width: 100%; height: 300px;
      background: linear-gradient(180deg, #0a0a1a 0%, #331a00 50%, #663300 100%);
      display: flex; align-items: center; justify-content: center;
      position: relative;
    }
    .fire { font-size: 120px; text-shadow: 0 0 50px #ff6600, 0 0 100px #ff3300; animation: flicker 1s infinite alternate; }
    @keyframes flicker { from { opacity: 0.9; transform: scale(1); } to { opacity: 1; transform: scale(1.05); } }
    .character { position: absolute; bottom: 10px; right: 30px; font-size: 80px; }
    .actions { margin-top: 30px; display: flex; flex-direction: column; gap: 20px; align-items: center; }
    .btn { padding: 12px 30px; font-size: 18px; border: none; border-radius: 8px; cursor: pointer; transition: all 0.3s; background: #e67e22; color: white; }
    .btn:hover:not(:disabled) { background: #d35400; transform: translateY(-2px); }
    .btn:disabled { background: #555; color: #aaa; cursor: not-allowed; transform: none; }
    .skip-btn { position: absolute; bottom: 30px; right: 30px; background: #e74c3c; padding: 12px 24px; }
    .hp-info { margin: 20px; font-size: 18px; }
  </style>
</head>
<body>
  <div class="campfire-bg">
    <div class="fire">🔥</div>
    <div class="character" id="char-icon">🦾</div>
  </div>
  <div class="hp-info">❤️ 当前生命：<span id="hp-display"></span></div>
  <div class="actions">
    <button class="btn" id="sleep-btn">😴 睡觉 (恢复30 HP)</button>
    <button class="btn" id="forge-btn">🔨 锻造卡牌</button>
  </div>
  <button class="btn skip-btn" id="skip-btn">跳过 →</button>

  <script>
    (async function() {
      const params = new URLSearchParams(window.location.search);
      const char = params.get('char') || '1';
      const currentNode = params.get('currentNode') || 'start';
      const nextNode = params.get('nextNode') || currentNode;
      const act = params.get('act') || '1';

      const charIcons = { '1': '🦾', '2': '❓' };
      document.getElementById('char-icon').textContent = charIcons[char] || '🦾';

      // 从后端加载最新存档
      let saveData = await loadSaveData(char);
      document.getElementById('hp-display').textContent = `${saveData.playerHp}/${saveData.maxHp}`;

      const campfireAction = sessionStorage.getItem('campfireAction');
      const sleepBtn = document.getElementById('sleep-btn');
      const forgeBtn = document.getElementById('forge-btn');

      function disableAll() { sleepBtn.disabled = true; forgeBtn.disabled = true; }

      if (campfireAction === 'sleep') { disableAll(); sleepBtn.textContent = '😴 已休息'; } 
      else if (campfireAction === 'forge') { disableAll(); forgeBtn.textContent = '🔨 已锻造'; }

      sleepBtn.addEventListener('click', async () => {
        if (campfireAction) return;
        saveData = await loadSaveData(char);
        const heal = Math.min(30, saveData.maxHp - saveData.playerHp);
        saveData.playerHp += heal;
        await saveSaveData(saveData);
        
        document.getElementById('hp-display').textContent = `${saveData.playerHp}/${saveData.maxHp}`;
        window.showModal(`恢复了 ${heal} 点生命！`, { title: '😴 休息恢复', icon: '💚', borderColor: '#2ecc71' });
        sessionStorage.setItem('campfireAction', 'sleep');
        disableAll();
        sleepBtn.textContent = '😴 已休息';
      });

      forgeBtn.addEventListener('click', () => {
        if (campfireAction) return;
        window.location.href = `forge.html?char=${char}&currentNode=${encodeURIComponent(currentNode)}&nextNode=${encodeURIComponent(nextNode)}&act=${act}`;
      });

      document.getElementById('skip-btn').addEventListener('click', () => {
        sessionStorage.removeItem('campfireAction');
        window.location.href = `map.html?char=${char}&currentNode=${encodeURIComponent(nextNode)}&act=${act}`;
      });
    })();
  </script>

  <!-- ✅ 放在 body 最底部 -->
  <script src="status_bar.js"></script>
</body>
</html>
