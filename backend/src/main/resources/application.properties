server.port=8080
spring.application.name=slay-the-spire-clone

# 内嵌 H2 内存库（重启后数据清空，方便调试）
spring.datasource.url=jdbc:h2:mem:cardgame
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# 可选：开启 H2 Web 控制台（调试用）
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# MyBatis-Plus
mybatis-plus.mapper-locations=classpath*:/mapper/**/*.xml
mybatis-plus.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl

# 添加前端文件夹作为静态资源目录（相对路径 ../frontend/ 自 backend/ 定位到同级 frontend/ 文件夹）
spring.web.resources.static-locations=file:../frontend/,classpath:/META-INF/resources/,classpath:/resources/,classpath:/static/,classpath:/public/